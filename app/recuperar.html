<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Taller 4</title>
  <link rel="icon" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/icons/book-half.svg">
  <!-- seo tags -->
  <meta name="author" content="Angie Rodriguez">
  <meta name="description" content="taller 4 de maquetacion web">
  <meta name="keywords" content="TALLER,taller,Taller">
  <!--OPTIMIZATION TAGS  meta [name="" content=""]*5-->
  <meta name="theme-color" content="#000000">
  <meta name="MobileOptimized" content="width">
  <meta name="HandheldFriendly" content="true">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-traslucent">
  <link rel="icon" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/icons/book-half.svg">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body class="bg-light">

  <nav class="navbar navbar-dark bg-dark">
    <div class="container">
      <a class="navbar-brand fw-bold" href="../index.html">
        <i class="bi bi-book-half me-2"></i>Biblioteca Horizonte
      </a>
    </div>
  </nav>

  <div class="container d-flex justify-content-center align-items-center" style="min-height: 90vh;">
    <div class="col-11 col-sm-8 col-md-6 col-lg-4">
      <div class="card shadow-sm">
        <div class="card-body p-4">
          <div class="text-center mb-4">
            <i class="bi bi-key text-primary" style="font-size: 2.5rem;"></i>
            <h4 class="fw-bold mt-2">Recuperar contraseña</h4>
            <p class="text-muted small">Escribe tu correo y te enviaremos instrucciones</p>
          </div>

          <form>
            <div class="mb-3">
              <label for="correoValido" class="form-label">Correo electrónico</label>
              <input type="email" class="form-control is-valid" id="correoValido" value="maria.rodriguez@correo.com">
              <div class="valid-feedback">
                ¡Correo verificado correctamente!
              </div>
            </div>

            <div class="mb-3">
              <label for="correoInvalido" class="form-label">Otro intento</label>
              <input type="email" class="form-control is-invalid" id="correoInvalido" value="usuario_desconocido@correo.com">
              <div class="invalid-feedback">
                Correo no encontrado. Verifica que esté bien escrito o regístrate.
              </div>
            </div>

            <button type="submit" class="btn btn-primary w-100">
              <i class="bi bi-send me-1"></i> Enviar instrucciones
            </button>
          </form>

          <hr>
          <p class="text-center small mb-0">
            <a href="login.html" class="text-decoration-none"><i class="bi bi-arrow-left"></i> Volver a iniciar sesión</a>
          </p>
        </div>
      </div>
      <p class="text-center mt-3">
        <a href="../index.html" class="small text-muted text-decoration-none"><i class="bi bi-arrow-left"></i> Volver al inicio</a>
      </p>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
