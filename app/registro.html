<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Taller 4</title>
  <link rel="icon" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/icons/book-half.svg">
  <!-- seo tags -->
  <meta name="author" content="Angie Rodriguez">
  <meta name="description" content="taller 4 de maquetacion web">
  <meta name="keywords" content="TALLER,taller,Taller">
  <!--OPTIMIZATION TAGS  meta [name="" content=""]*5-->
  <meta name="theme-color" content="#000000">
  <meta name="MobileOptimized" content="width">
  <meta name="HandheldFriendly" content="true">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-traslucent">
  <link rel="icon" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/icons/book-half.svg">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body class="bg-light">

  <nav class="navbar navbar-dark bg-dark">
    <div class="container">
      <a class="navbar-brand fw-bold" href="../index.html">
        <i class="bi bi-book-half me-2"></i>Biblioteca Horizonte
      </a>
    </div>
  </nav>

  <div class="container d-flex justify-content-center align-items-center py-5" style="min-height: 90vh;">
    <div class="col-11 col-sm-10 col-md-8 col-lg-6">
      <div class="card shadow-sm">
        <div class="card-body p-4">
          <div class="text-center mb-4">
            <i class="bi bi-person-plus text-primary" style="font-size: 2.5rem;"></i>
            <h4 class="fw-bold mt-2">Crear cuenta nueva</h4>
            <p class="text-muted small">Únete a la comunidad de Biblioteca Horizonte</p>
          </div>

          <form>
            <div class="row g-3 mb-3">
              <div class="col-md-6">
                <label for="nombre" class="form-label">Nombre</label>
                <input type="text" class="form-control" id="nombre" placeholder="Ej: María">
              </div>
              <div class="col-md-6">
                <label for="apellidos" class="form-label">Apellidos</label>
                <input type="text" class="form-control" id="apellidos" placeholder="Ej: Rodríguez Gómez">
              </div>
            </div>

            <div class="row g-3 mb-3">
              <div class="col-md-6">
                <label for="correo" class="form-label">Correo electrónico</label>
                <input type="email" class="form-control" id="correo" placeholder="nombre@correo.com">
              </div>
              <div class="col-md-6">
                <label for="telefono" class="form-label">Teléfono</label>
                <input type="tel" class="form-control" id="telefono" placeholder="300 123 4567">
              </div>
            </div>

            <div class="row g-3 mb-3">
              <div class="col-md-6">
                <label for="password" class="form-label">Contraseña</label>
                <input type="password" class="form-control" id="password" placeholder="Mínimo 8 caracteres">
              </div>
              <div class="col-md-6">
                <label for="password2" class="form-label">Confirmar contraseña</label>
                <input type="password" class="form-control" id="password2" placeholder="Repite tu contraseña">
              </div>
            </div>

            <div class="form-check mb-3">
              <input class="form-check-input" type="checkbox" id="terminos">
              <label class="form-check-label small" for="terminos">
                Acepto los <a href="#">términos y condiciones</a> de la biblioteca
              </label>
            </div>

            <button type="submit" class="btn btn-primary w-100">
              <i class="bi bi-check-circle me-1"></i> Registrarme
            </button>
          </form>

          <hr>
          <p class="text-center small mb-0">
            ¿Ya tienes cuenta? <a href="login.html" class="text-decoration-none">Inicia sesión aquí</a>
          </p>
        </div>
      </div>
      <p class="text-center mt-3">
        <a href="../index.html" class="small text-muted text-decoration-none"><i class="bi bi-arrow-left"></i> Volver al inicio</a>
      </p>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
